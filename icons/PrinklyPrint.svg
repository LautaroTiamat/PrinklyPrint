<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo redondeado con gradiente azul profesional -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="printer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Hoja saliendo de la impresora (atrás) -->
  <g filter="url(#shadow)">
    <rect x="146" y="120" width="220" height="180" rx="6" fill="url(#paper)" stroke="#cbd5e1" stroke-width="2"/>
    <!-- Líneas de texto en la hoja -->
    <rect x="170" y="150" width="120" height="8" rx="2" fill="#cbd5e1"/>
    <rect x="170" y="172" width="160" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="170" y="188" width="140" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="170" y="204" width="170" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="170" y="220" width="130" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="170" y="236" width="155" height="6" rx="2" fill="#e2e8f0"/>
  </g>

  <!-- Cuerpo de la impresora -->
  <g filter="url(#shadow)">
    <!-- Parte superior (slot de papel) -->
    <rect x="120" y="280" width="272" height="30" rx="4" fill="#374151"/>
    <!-- Cuerpo principal -->
    <rect x="110" y="305" width="292" height="120" rx="10" fill="url(#printer)" stroke="#6b7280" stroke-width="2"/>
    <!-- Panel frontal con detalles -->
    <rect x="130" y="335" width="252" height="70" rx="6" fill="#f9fafb"/>
    <!-- Display LED -->
    <rect x="150" y="350" width="80" height="22" rx="3" fill="#10b981"/>
    <circle cx="160" cy="361" r="3" fill="#065f46"/>
    <rect x="170" y="357" width="50" height="3" rx="1" fill="#065f46"/>
    <rect x="170" y="363" width="40" height="3" rx="1" fill="#065f46"/>
    <!-- Botones -->
    <circle cx="270" cy="361" r="8" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="300" cy="361" r="8" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="330" cy="361" r="8" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
    <!-- Bandeja de salida -->
    <rect x="140" y="390" width="232" height="10" rx="2" fill="#e5e7eb"/>
  </g>

  <!-- Indicador verde de "automático/activo" arriba a la derecha -->
  <circle cx="400" cy="140" r="32" fill="#10b981" stroke="#ffffff" stroke-width="6"/>
  <path d="M 385 140 L 396 151 L 415 130" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
